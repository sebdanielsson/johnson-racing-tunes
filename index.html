<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Browse Johnson Racing Tunes — Forza car tune share codes across Horizon 6, 5, 4, 3 and Motorsport 7. Search, filter and copy the best community tunes."
    />
    <meta name="theme-color" content="#0a0a0b" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Johnson Racing Tunes" />
    <meta property="og:url" content="https://johnson-racing-tunes.vercel.app/" />
    <meta property="og:title" content="Johnson Racing Tunes — Forza Tune Share Codes" />
    <meta
      property="og:description"
      content="Every community tune share code from Johnson Racing Tunes — searchable, filterable, and one tap to copy. Across Forza Horizon 6, 5, 4, 3 and Motorsport 7."
    />
    <meta property="og:image" content="https://johnson-racing-tunes.vercel.app/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Johnson Racing Tunes — find the perfect Forza tune, in seconds."
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Johnson Racing Tunes — Forza Tune Share Codes" />
    <meta
      name="twitter:description"
      content="Every community tune share code from Johnson Racing Tunes — searchable, filterable, and one tap to copy."
    />

    <title>Johnson Racing Tunes — Forza Tune Share Codes</title>
    <script>
      // Apply the saved theme before paint to avoid a flash. Dark is default.
      (function () {
        try {
          var t = localStorage.getItem("jrt-theme");
          var dark = t ? t === "dark" : true;
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
